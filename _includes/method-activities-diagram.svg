<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="bt bd" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <title id="bt">The arc42 method: six activities and their relations</title>
  <desc id="bd">Six activity boxes connected by double-headed arrows. Clarify requirements and constraints at the top, involving stakeholders. Design structures and design cross-cutting concepts overlap in the middle: structural decisions and concepts influence each other directly. Below: communicate architecture to stakeholders, accompany the implementation, and analyze and evaluate, which feeds back into clarifying requirements.</desc>
  <style>
    svg { --ink: #2b3440; --accent: #c94f2e; --muted: #7a838c; --line: #b9c0c7; --paper: #ffffff; }
    .box    { fill: var(--paper); stroke: var(--ink); stroke-width: 1.5; }
    .olap   { fill: var(--accent); opacity: .28; }
    .lbl    { fill: var(--ink); font-size: 17px; font-weight: 600; text-anchor: middle; }
    .rel    { fill: none; stroke: var(--muted); stroke-width: 1.6; }
    .people { fill: var(--muted); }
    .activity { cursor: default; }
    .activity:hover .box { stroke: var(--accent); stroke-width: 2.25; }
    .activity:hover .lbl { fill: var(--accent); }
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a838c" style="fill:var(--muted)"/>
    </marker>
    <g id="bperson"><circle cx="0" cy="0" r="4.2"/><rect x="-5.8" y="5.2" width="11.6" height="9.5" rx="5"/></g>
    <g id="bpair"><use href="#bperson"/><use href="#bperson" x="13" y="4" opacity=".55"/></g>
  </defs>

  <!-- relations, all bidirectional -->
  <path class="rel" marker-start="url(#ah)" marker-end="url(#ah)" d="M320,118 L268,224"/>
  <path class="rel" marker-start="url(#ah)" marker-end="url(#ah)" d="M392,118 L428,179"/>
  <path class="rel" marker-start="url(#ah)" marker-end="url(#ah)" d="M482,106 C648,152 646,296 602,384"/>
  <path class="rel" marker-start="url(#ah)" marker-end="url(#ah)" d="M228,316 L172,389"/>
  <path class="rel" marker-start="url(#ah)" marker-end="url(#ah)" d="M352,316 L372,389"/>
  <path class="rel" marker-start="url(#ah)" marker-end="url(#ah)" d="M492,301 L556,384"/>
  <path class="rel" marker-start="url(#ah)" marker-end="url(#ah)" d="M484,72 L562,64"/>
  <path class="rel" marker-start="url(#ah)" marker-end="url(#ah)" d="M120,481 L97,503"/>
  <path class="rel" marker-start="url(#ah)" marker-end="url(#ah)" d="M178,481 L201,503"/>

  <!-- clarify requirements -->
  <g class="activity">
    <rect class="box" x="240" y="28" width="240" height="86"/>
    <text class="lbl" x="360" y="62">Clarify requirements</text>
    <text class="lbl" x="360" y="86">and constraints</text>
  </g>

  <!-- concepts first, structures on top: their overlap is the point -->
  <g class="activity">
    <rect class="box" x="335" y="185" width="190" height="110"/>
    <text class="lbl" x="447" y="230">Design cross-</text>
    <text class="lbl" x="447" y="254">cutting concepts</text>
  </g>
  <g class="activity">
    <rect class="box" x="180" y="230" width="190" height="80"/>
    <text class="lbl" x="258" y="262">Design</text>
    <text class="lbl" x="258" y="286">structures</text>
  </g>
  <rect class="olap" x="335" y="230" width="35" height="65"/>

  <!-- bottom row -->
  <g class="activity">
    <rect class="box" x="60" y="395" width="185" height="84"/>
    <text class="lbl" x="152" y="429">Communicate</text>
    <text class="lbl" x="152" y="453">architecture</text>
  </g>
  <g class="activity">
    <rect class="box" x="295" y="395" width="165" height="84"/>
    <text class="lbl" x="377" y="429">Accompany</text>
    <text class="lbl" x="377" y="453">implementation</text>
  </g>
  <g class="activity">
    <rect class="box" x="500" y="390" width="180" height="92"/>
    <text class="lbl" x="590" y="424">Analyze and</text>
    <text class="lbl" x="590" y="448">evaluate</text>
  </g>

  <!-- stakeholders -->
  <g class="people" transform="translate(586,56)"><use href="#bpair"/></g>
  <g class="people" transform="translate(84,516)"><use href="#bpair"/></g>
  <g class="people" transform="translate(202,516)"><use href="#bpair"/></g>
</svg>
