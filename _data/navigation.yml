# ---------------------------------------------------------------------------
# Top navigation (2026 layout)
#   main   -> inline priority links shown in the masthead bar
#             (Download is flagged `cta: true` and rendered as the navy button)
#   drawer -> the "More…" hamburger contents (secondary / resource links)
# ---------------------------------------------------------------------------

# inline priority links (order matters)
main:
  - title: "Overview"
    url: /overview/
  - title: "Docs"
    url: /documentation/
  - title: "Examples"
    url: /examples/
  - title: "Training"
    url: /learn/
  - title: "Download"
    url: /download/
    cta: true
  - title: "About"
    url: /about/

# "More…" hamburger drawer — grouped secondary links
drawer:
  - title: "Publications"
    children:
      - title: "Books"
        url: /books/
      - title: "Articles"
        url: /articles/
      - title: "Videos"
        url: /videos/
      - title: "Talks"
        url: /talks/
  - title: "On this site"
    children:
      - title: "Search"
        url: /search/
      - title: "Contact"
        url: /contact/
      - title: "License"
        url: /license/
      - title: "Impressions"
        url: /gallery/
  - title: "arc42 elsewhere"
    children:
      - title: "German site — arc42.de"
        url: https://www.arc42.de
      - title: "Trainings & dates"
        url: https://trainings.arc42.org
      - title: "Status"
        url: https://status.arc42.org

# about  (consumed by page sidebars via _includes/nav_list — keep intact)
about:
  - title: About arc42
    url: /about/
    children:
    - title: "Contact"
      url: /contact/
    - title: "Contributors"
      url: https://github.com/arc42/arc42-template/graphs/contributors
    - title: "License"
      url: /license/
    - title: "Impressions"
      url: /gallery/


# publications  (consumed by page sidebars via _includes/nav_list — keep intact)
publications:
  - title: Publikations
    children:
      - title: Books
        url: /books/
      - title: Articles
        url: /articles/
      - title: Videos
        url: /videos/
      - title: Talks
        url: /talks/
