# arc42 translators.
#
# One entry per PERSON. Rendered on /about (#community) in two tiers:
#   1. Full credit roll  — every entry, grouped by `language`. A name links to
#      its first `links:` entry when present.
#   2. "Meet some of our translators" — entries that have a `bio` OR a `portrait`,
#      shown as cards (portrait optional; falls back to an initials monogram).
#
# Fields:
#   name      (required) full name as it should appear
#   language  (required) the language they translated, in its own script
#   bio       (optional) 1-3 sentences
#   portrait  (optional) e.g. /images/translators/damien-lucas.webp (square, ~320px)
#   links     (optional) list of { label, url }; first one also links the name in tier 1

- name: "Jakub Tomíšek"
  language: "Čeština"
  portrait: "/images/translators/jakub-tomisek.webp"
  bio: >
    A software architect focused on automating and integrating software delivery
    pipelines, DevOps workflows and complex development processes. He contributes to
    arc42 because its clear, universal structure enables seamless communication across
    teams, cultures and languages, making software architecture accessible and
    actionable throughout the entire delivery lifecycle.
  links:
    - label: "LinkedIn"
      url: "https://www.linkedin.com/in/jakub-tomisek/"

