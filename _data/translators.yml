    A software developer currently focused on Java and microservice architectures,
    who explores open-source ideas around software design, testing and architecture
    documentation, including JavaSpec, a Java testing tool inspired by PhpSpec. His
    interest in arc42 grew from its potential to bring Documentation as Code into
    DevOps: the arc42 guidelines keep essential architecture documentation
    structured, lightweight and continuously up to date.
  links:
